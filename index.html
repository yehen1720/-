<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>シェルゲーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <header class="top">
      <p class="eyebrow">Focus Game</p>
      <h1>シェルゲーム</h1>
      <p class="lead">ボールの位置を見失わずに、最後まで追い切ろう。</p>

      <div class="hud">
        <div class="pill">ROUND <span id="level">1</span></div>
        <div class="pill">WIN <span id="win">0</span></div>
        <div class="pill">LOSE <span id="lose">0</span></div>
      </div>

      <div class="btns">
        <div class="spacer"></div>
        <button id="reset" class="btn danger">RESET</button>
      </div>

      <p id="msg" class="msg">STARTを押してね</p>
    </header>

    <section class="stage">
      <div id="lane" class="lane" aria-label="boxes lane"></div>
    </section>

    <div id="modalBackdrop" class="backdrop hidden">
      <div class="modal">
        <p class="modalText">最初からやり直しますか？</p>
        <div class="modalBtns">
          <button id="modalCancel" class="btn">戻る</button>
          <button id="modalOk" class="btn danger">リセット</button>
        </div>
      </div>
    </div>

    <div id="introScreen" class="intro hidden">
      <div class="introText">
        7勝でクリア。<br />
        最後まで追えたら、ちゃんと褒めます。
      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
